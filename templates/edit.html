<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier tâche</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root {
            --bg-color: {{ settings.bg_color }};
            --card-color: {{ settings.card_color }};
            --primary-color: {{ settings.primary_color }};
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="card">
            <h1>Modifier la tâche</h1>
            <p class="subtitle">Modifiez la tâche</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-container">
                        {% for category, message in messages %}
                            <div class="flash-message flash-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="task-form">
                <input type="text" name="task" value="{{ task.title }}" required>
                <textarea name="note">{{ task.note if task.note else '' }}</textarea>

                <select name="category">
                    {% for category in categories %}
                        <option value="{{ category }}" {% if (task.category if task.category else "Général") == category %}selected{% endif %}>{{ category }}</option>
                    {% endfor %}
                    <option value="Voyage" {% if task.category == "Voyage" %}selected{% endif %}>Voyage</option>
                    <option value="Sport" {% if task.category == "Sport" %}selected{% endif %}>Sport</option>
                    <option value="Travail" {% if task.category == "Travail" %}selected{% endif %}>Travail</option>
                    <option value="Cours" {% if task.category == "Cours" %}selected{% endif %}>Cours</option>
                    <option value="Personnel" {% if task.category == "Personnel" %}selected{% endif %}>Personnel</option>
                    <option value="Lecture" {% if task.category == "Lecture" %}selected{% endif %}>Lecture</option>
                    <option value="Urgent" {% if task.category == "Urgent" %}selected{% endif %}>Urgent</option>
                </select>

                <select name="priority">
                    <option value="Faible" {% if task.priority == "Faible" %}selected{% endif %}>Faible</option>
                    <option value="Moyenne" {% if task.priority == "Moyenne" %}selected{% endif %}>Moyenne</option>
                    <option value="Élevée" {% if task.priority == "Élevée" %}selected{% endif %}>Élevée</option>
                </select>

                <input type="date" name="deadline" value="{{ task.deadline if task.deadline else '' }}">

                <button type="submit">Valider</button>
            </form>

            <a href="{{ url_for('index') }}" class="back-btn">Retour</a>
        </div>
    </div>
</body>
</html>
