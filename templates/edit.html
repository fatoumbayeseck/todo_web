<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier tâche</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root {
            --bg-color: {{ settings.bg_color }};
            --card-color: {{ settings.card_color }};
            --primary-color: {{ settings.primary_color }};
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="card">
            <h1>Modifier la tâche</h1>
            <p class="subtitle">Modifiez la tâche</p>

            <form method="POST" class="task-form">
                <input type="text" name="task" value="{{ task.title }}" required>
                <textarea name="note">{{ task.note if task.note else '' }}</textarea>

                <select name="priority">
                    <option value="Faible" {% if task.priority == "Faible" %}selected{% endif %}>Faible</option>
                    <option value="Moyenne" {% if task.priority == "Moyenne" %}selected{% endif %}>Moyenne</option>
                    <option value="Élevée" {% if task.priority == "Élevée" %}selected{% endif %}>Élevée</option>
                </select>

                <input type="date" name="deadline" value="{{ task.deadline if task.deadline else '' }}">

                <button type="submit">Valider</button>
            </form>

            <a href="{{ url_for('index') }}" class="back-btn">Retour</a>
        </div>
    </div>
</body>
</html>
